<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 10px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #38bdf8;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
    
</head>
<body>
    <div class="box">
        <h1>Thank You! 🎉</h1>
        <p>Your message has been sent successfully.</p>
    </div>
</body>
</html>
